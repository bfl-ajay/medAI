<div class="main-layout" [class.sidebar-open]="sidebarOpen" *ngIf="isLoggedInUser; else notLoggedIn">

  <!-- SIDEBAR (Logged In Only) -->
  <aside class="sidebar" [class.open]="sidebarOpen">
    <!-- Sidebar Header -->
    <div class="sidebar-header">
      <div class="sidebar-logo"> <i class="fa-solid fa-staff-snake"></i></div>
      <div class="sidebar-brand">Health Adviser</div>
    </div>

    <!-- Sidebar Menu -->
    <ul class="sidebar-menu">
      <li>
        <a routerLink="/dashboard" routerLinkActive="active" (click)="closeSidebar()">
          <span class="menu-text">Dashboard</span>
        </a>
      </li>
      <li>
        <a routerLink="/upload-reports" routerLinkActive="active" (click)="closeSidebar()">
          <span class="menu-text">Upload Reports</span>
        </a>
      </li>
      <li>
        <a routerLink="/upload-prescription" routerLinkActive="active" (click)="closeSidebar()">
          <span class="menu-text">Prescriptions</span>
        </a>
      </li>
      <li>
        <a routerLink="/add-info" routerLinkActive="active" (click)="closeSidebar()">
          <span class="menu-text">Add Info</span>
        </a>
      </li>
    </ul>

    <!-- Sidebar Footer (Below Sidebar) -->
    <div class="sidebar-footer" *ngIf="user">

      <div class="user-card">
        <strong>{{ user?.name }}</strong>
        <small>{{ user?.email }}</small>
      </div>

      <button class="btn-settings" (click)="goToProfile()">
        <i class="fa-solid fa-user"></i>
        PROFILE
      </button>

      <button class="btn-settings" (click)="goToSecurity()">
        <i class="fa-solid fa-lock"></i>
        SECURITY
      </button>
      <button class="btn-settings" (click)="goToPlan()">
        <i class="fa-solid fa-crown"></i>
        PLAN
      </button>
      <button class="btn-logout-sidebar" (click)="logout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        LOGOUT
      </button>

    </div>
  </aside>

  <!-- Mobile Overlay -->
  <div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>

  <!-- Main Content Area (Logged In) -->
  <div class="main-content">
    <!-- Mobile Top Bar -->
    <div class="mobile-top-bar">
      <!-- Mobile Hamburger Button -->
      <button class="mobile-hamburger" (click)="toggleSidebar()" [class.active]="sidebarOpen">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Mobile Brand -->
      <div class="mobile-brand">
        <div class="mobile-logo">⚕️</div>
        <div class="mobile-brand-text">Health Adviser</div>
      </div>
    </div>

    <!-- Router Outlet for Page Content -->
    <router-outlet></router-outlet>
  </div>

</div>

<!-- NOT LOGGED IN NAVBAR -->
<ng-template #notLoggedIn>
  <nav class="navbar navbar-public">
    <div class="nav-inner">
      <!-- Hamburger -->
      <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Toggle navigation"
        [attr.aria-expanded]="menuOpen"> <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <!-- Brand -->
      <a [routerLink]="'/'" class="brand" (click)="closeMenu()">
        <span class="brand-icon">⚕️</span>
        <span class="brand-text">Health Adviser</span>
      </a>

      <!-- Nav Links -->

      <ul class="nav-links" [class.open]="menuOpen">

        <li>
          <a [routerLink]="['/']" fragment="Home" (click)="navigateAndClose()">Home</a>
        </li>

        <li>
          <a [routerLink]="['/']" fragment="Services" (click)="navigateAndClose()">About</a>
        </li>

        <li>
          <a [routerLink]="['/']" fragment="Vision" (click)="navigateAndClose()">Vision</a>
        </li>

        <li>
          <a [routerLink]="['/']" fragment="Testimonial" (click)="navigateAndClose()">Testimonial</a>
        </li>

        <li>
          <a [routerLink]="['/']" fragment="Contact" (click)="navigateAndClose()">Contact</a>
        </li>

        <li>
          <a routerLink="/login" (click)="menuOpen=false">Login</a>
        </li>

        <li>
          <a routerLink="/register" (click)="closeMenu()">Register</a>
        </li>

      </ul>
    </div>
  </nav>


  <div class="" [class.show]="menuOpen" (click)="closeMenu()">
  </div>

  <!-- Router Outlet for Public Pages -->
  <router-outlet></router-outlet>
</ng-template>
