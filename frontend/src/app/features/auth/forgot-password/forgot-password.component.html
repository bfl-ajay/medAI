<div class="login-container">

    <!-- Decorative dots -->
    <div class="bg-decoration bg-left"></div>
    <div class="bg-decoration bg-right"></div>

    <div class="login-wrapper">

        <!-- LEFT SIDE -->
        <div class="login-left">

            <div class="form-container">

                <h2 class="form-title">Forgot Password</h2>

                <p class="form-subtitle-small">
                    Enter your email to receive a password reset OTP
                </p>

                <!-- ERROR -->
                <div class="error-message" *ngIf="errorMessage">
                    {{errorMessage}}
                </div>

                <!-- EMAIL -->
                <div class="input-group" *ngIf="!otpSent">

                    <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18">
                        <rect x="2" y="4" width="14" height="10" rx="2" stroke="#888" />
                        <path d="M2 4l7 5 7-5" stroke="#888" />
                    </svg>

                    <input type="email" placeholder="Email" [(ngModel)]="email">

                </div>

                <!-- SEND OTP -->
                <button class="login-btn" *ngIf="!otpSent" (click)="sendOTP()" [disabled]="isLoading">

                    {{ isLoading ? 'Sending OTP...' : 'Send OTP' }}

                </button>

                <!-- OTP INPUT -->
                <div class="input-group" *ngIf="otpSent && !otpVerified">

                    <input type="text" placeholder="Enter OTP" [(ngModel)]="otp">

                </div>

                <!-- VERIFY OTP -->
                <button class="login-btn" *ngIf="otpSent && !otpVerified" (click)="verifyOTP()">

                    Verify OTP

                </button>

                <!-- NEW PASSWORD -->
                <div *ngIf="otpVerified">

                    <div class="input-group">
                        <input type="password" placeholder="New Password" [(ngModel)]="newPassword">
                    </div>

                    <div class="input-group">
                        <input type="password" placeholder="Confirm Password" [(ngModel)]="confirmPassword">
                    </div>

                    <button class="login-btn" (click)="resetPassword()">
                        Reset Password
                    </button>

                </div>

                <!-- BACK -->
                <p class="signup-link">
                    Remember your password?
                    <a (click)="goToLogin()" class="signup-redirect">
                        Back to Login
                    </a>
                </p>

            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="login-right">

            <p class="form-subtitle">
                Securely recover your Health Adviser account
            </p>

            <svg class="laptop-illustration" viewBox="0 0 300 300">

                <circle cx="200" cy="180" r="80" fill="#B3E5D5" opacity="0.3" />
                <circle cx="180" cy="160" r="60" fill="#7DD3C0" opacity="0.4" />

                <!-- lock -->
                <rect x="120" y="140" width="60" height="50" rx="8" fill="#458FF6" />
                <path d="M135 140v-15a15 15 0 0 1 30 0v15" stroke="white" stroke-width="4" stroke-linecap="round" />

                <circle cx="150" cy="165" r="5" fill="white" />

            </svg>

        </div>

    </div>

</div>
