<div class="login-container">
  <!-- Background Decorative Elements -->
  <div class="bg-decoration bg-left"></div>
  <div class="bg-decoration bg-right"></div>

  <div class="login-wrapper">
    <!-- Left Side - Form -->
    <div class="login-left">
      <!-- Logo/Header -->
      <!-- <div class="logo-section">
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="12" width="24" height="16" rx="2" stroke="#1a7a7a" stroke-width="2" />
            <path d="M14 20h12" stroke="#1a7a7a" stroke-width="2" stroke-linecap="round" />
            <circle cx="28" cy="16" r="2" fill="#1a7a7a" />
          </svg>
        </div>
      </div> -->

      <!-- Login Form -->
      <div class="form-container">
        <h2 class="form-title">Login</h2>


        <!-- Error Message -->
        <div class="error-message" *ngIf="errorMessage">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="2" />
            <path d="M8 5v4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <circle cx="8" cy="12" r="0.5" fill="currentColor" />
          </svg>
          {{ errorMessage }}
        </div>

        <!-- Email Input -->
        <div class="input-group">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="4" width="14" height="10" rx="2" stroke="#888" stroke-width="1.5" />
            <path d="M2 4l7 5 7-5" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <input type="email" placeholder="Email" [(ngModel)]="loginData.email" name="email" required>
        </div>

        <!-- Password Input -->
        <div class="input-group">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="4" y="8" width="10" height="7" rx="1" stroke="#888" stroke-width="1.5" />
            <path d="M6 8V6a2 2 0 0 1 4 0v2" stroke="#888" stroke-width="1.5" stroke-linecap="round" />
          </svg>
          <div class="password-wrapper">
            <input [type]="showPassword ? 'text' : 'password'" placeholder="Password" [(ngModel)]="loginData.password"
              name="password" required>
            <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
        </div>

        <!-- Options -->
        <div class="options">
          <label class="remember">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a (click)="goToForgotPassword()" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Login Button -->
        <!-- <button type="button" class="login-btn" (click)="login()">Login</button> -->
        <button class="login-btn" type="button" (click)="login()" [disabled]="isLoading">

          {{ isLoading ? 'Sending OTP...' : 'Login' }}

        </button>
        <!-- Sign Up Link -->
        <p class="signup-link">
          Don't have an account? <a (click)="navigateToRegister()" class="signup-redirect">Create one</a>
        </p>
      </div>
    </div>

    <!-- Right Side - Illustration -->
    <div class="login-right">
      <div class="hero-dots hero-dots-left"></div>
      <p class="form-subtitle">Welcome back to Health Adviser</p>
      <svg class="laptop-illustration" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- Decorative circles -->
        <circle cx="200" cy="180" r="80" fill="#B3E5D5" opacity="0.3" />
        <circle cx="180" cy="160" r="60" fill="#7DD3C0" opacity="0.4" />
        <circle cx="220" cy="200" r="50" fill="#5CCFB8" opacity="0.3" />

        <!-- Plant -->
        <ellipse cx="240" cy="240" rx="25" ry="35" fill="#2D7A5F" />
        <path d="M235 220Q230 210 225 200" stroke="#2D7A5F" stroke-width="3" fill="none" stroke-linecap="round" />
        <path d="M245 220Q250 210 255 200" stroke="#2D7A5F" stroke-width="3" fill="none" stroke-linecap="round" />
        <ellipse cx="220" cy="250" rx="20" ry="12" fill="#4A9B7F" />

        <!-- Laptop base -->
        <rect x="90" y="220" width="130" height="8" rx="4" fill="#3A3A3A" />

        <!-- Laptop screen -->
        <path
          d="M110 80 L210 80 Q220 80 220 90 L220 210 Q220 220 210 220 L110 220 Q100 220 100 210 L100 90 Q100 80 110 80"
          fill="#2C4A6B" stroke="#1A1A1A" stroke-width="2" />

        <!-- Screen shine/highlight -->
        <path d="M115 90 L215 90 Q215 95 210 95 L115 95 Z" fill="#ffffff" opacity="0.15" />

        <!-- Screen content - simplified dashboard -->
        <rect x="115" y="110" width="90" height="8" rx="2" fill="#5CCFB8" />
        <rect x="115" y="125" width="70" height="4" rx="2" fill="#7DD3C0" opacity="0.7" />
        <rect x="115" y="135" width="80" height="4" rx="2" fill="#7DD3C0" opacity="0.7" />
        <rect x="115" y="145" width="75" height="4" rx="2" fill="#7DD3C0" opacity="0.7" />

        <!-- Keyboard detail -->
        <rect x="100" y="220" width="120" height="12" rx="2" fill="#2A2A2A" />
        <circle cx="115" cy="226" r="1.5" fill="#555" />
        <circle cx="125" cy="226" r="1.5" fill="#555" />
        <circle cx="135" cy="226" r="1.5" fill="#555" />
        <circle cx="115" cy="232" r="1.5" fill="#555" />
        <circle cx="125" cy="232" r="1.5" fill="#555" />
        <circle cx="135" cy="232" r="1.5" fill="#555" />

        <!-- Notification bubble -->
        <circle cx="160" cy="120" r="16" fill="#E74C3C" />
        <text x="160" y="125" text-anchor="middle" font-size="20" fill="white" font-weight="bold">1</text>
      </svg>
      <div class="hero-dots hero-dots-right"></div>
    </div>
  </div>
</div>
